<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zx_Ruru Comunity</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

    <style>
        /* Fondo base oscuro */
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #0a0110; /* Morado noche muy profundo */
            font-family: Arial, sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* CAPA 1: Cuadrícula tecnológica brillante */
        .grid-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(147, 51, 234, 0.3) 1px, transparent 1px),
                linear-gradient(90deg, rgba(147, 51, 234, 0.3) 1px, transparent 1px);
            background-size: 50px 50px;
            background-position: center;
            z-index: 1;
        }

        /* CAPA 2: Escáner láser en movimiento continuo */
        .grid-bg::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, transparent, rgba(168, 85, 247, 0.2), transparent);
            animation: scanline 4s linear infinite;
        }

        @keyframes scanline {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }

        /* Contenedor principal por encima del fondo */
        .contenido-web {
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 45px;
            text-align: center;
        }

        /* Estilo del título Píxel Grande y Blanco */
        .titulo-pixel {
            font-family: 'Press Start 2P', monospace;
            font-size: 38px;
            color: #ffffff;
            text-transform: uppercase;
            text-shadow: 5px 5px 0px #a855f7; /* Sombra morada eléctrica */
            margin: 0;
            padding: 0 20px;
            letter-spacing: 2px;
        }

        /* Estilo del botón de Discord */
        .btn-discord {
            display: inline-flex;
            align-items: center;
            gap: 14px;
            padding: 18px 40px;
            font-size: 22px;
            font-weight: bold;
            color: white;
            background-color: #5865F2;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            text-decoration: none;
            transition: background-color 0.3s ease, transform 0.2s ease, box-shadow 0.3s ease;
            box-shadow: 0 0 25px rgba(168, 85, 247, 0.7); /* Brillo de neón morado */
        }

        /* Efectos interactivos del botón */
        .btn-discord:hover {
            background-color: #4752C4;
            transform: scale(1.05);
            box-shadow: 0 0 35px rgba(168, 85, 247, 0.9);
        }

        .btn-discord i {
            font-size: 26px;
        }
    </style>
</head>
<body>

    <div class="grid-bg"></div>

    <div class="contenido-web">
        <h1 class="titulo-pixel">Zx_Ruru Comunity</h1>
        
        <a href="https://discord.gg/GzfUbcRrQM" target="_blank" class="btn-discord">
            <i class="fa-brands fa-discord"></i> Discord
        </a>
    </div>

</body>
</html>
