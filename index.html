<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tienda - Slots</title>
  
  <style>
    /* --- AQUÍ VA EL CSS --- */
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    .ventana-app {
      width: 100vw;
      height: 100vh;
      overflow: hidden; 
    }

    .deslizador {
      display: flex;
      width: 200vw; 
      height: 100%;
      /* La magia del rebote cartoon */
      transition: transform 0.6s cubic-bezier(0.68, -0.55, 0.27, 1.55);
    }

    .pantalla {
      width: 100vw; 
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .pantalla-discord {
      background-color: #5865F2; 
      color: white;
    }

    .mover-derecha {
      transform: translateX(-100vw);
    }

    /* Estilos de los slots y botones */
    .slot {
      background: #f0f0f0;
      padding: 20px;
      margin: 10px;
      border-radius: 10px;
      text-align: center;
      width: 250px;
    }

    button {
      padding: 10px 20px;
      font-size: 18px;
      cursor: pointer;
      border: none;
      border-radius: 8px;
      background-color: #333;
      color: white;
      margin-top: 10px;
      transition: background-color 0.2s;
    }

    button:hover { 
      background-color: #555; 
    }

    #btn-volver {
      background-color: white;
      color: #5865F2;
      font-weight: bold;
    }
    
    #btn-volver:hover {
      background-color: #ddd;
    }
  </style>
</head>
<body>

  <div class="ventana-app">
    <div class="deslizador" id="deslizador">
      
      <div class="pantalla principal">
        <h1>Tienda del Servidor</h1>
        
        <div class="slot">
          <h3>Rango VIP</h3>
          <button class="btn-buy">Buy</button> 
        </div>
        
        <div class="slot">
          <h3>Caja Épica</h3>
          <button class="btn-buy">Buy</button>
        </div>
      </div>

      <div class="pantalla pantalla-discord">
        <h1>¡COMPRAS EN EL DISCORD!</h1>
        <p>Abre un ticket en nuestro servidor para reclamar tu compra.</p>
        
        <button onclick="window.open('https://discord.gg/TU_CODIGO', '_blank')">Ir al Discord</button>
        <button id="btn-volver">Volver a los slots</button>
      </div>

    </div>
  </div>

  <script>
    const botonesBuy = document.querySelectorAll('.btn-buy');
    const deslizador = document.getElementById('deslizador');
    const btnVolver = document.getElementById('btn-volver');

    // Mueve la pantalla al pulsar cualquier botón de compra
    botonesBuy.forEach(boton => {
      boton.addEventListener('click', () => {
        deslizador.classList.add('mover-derecha');
      });
    });

    // Devuelve la pantalla a su sitio
    btnVolver.addEventListener('click', () => {
      deslizador.classList.remove('mover-derecha');
    });
  </script>

</body>
</html>
