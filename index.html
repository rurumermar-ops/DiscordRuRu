<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zx_Ruru Comunity</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

    <style>
        /* Fondo infinito con scroll activo */
        html, body {
            margin: 0;
            padding: 0;
            min-height: 200vh;
            background-color: #0a0110;
            font-family: Arial, sans-serif;
            color: white;
        }

        /* CAPA DEL FONDO: Fija mientras bajas */
        .grid-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(147, 51, 234, 0.25) 1px, transparent 1px),
                linear-gradient(90deg, rgba(147, 51, 234, 0.25) 1px, transparent 1px);
            background-size: 50px 50px;
            background-position: center;
            z-index: 1;
        }

        /* Línea de escaneo láser */
        .grid-bg::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, transparent, rgba(168, 85, 247, 0.15), transparent);
            animation: scanline 6s linear infinite;
        }

        @keyframes scanline {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }

        /* Contenedor principal */
        .wrapper {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        /* SECCIÓN 1: Arriba (Discord) */
        .seccion-top {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 45px;
        }

        .titulo-pixel {
            font-family: 'Press Start 2P', monospace;
            font-size: 38px;
            color: #ffffff;
            text-transform: uppercase;
            text-shadow: 5px 5px 0px #a855f7;
            margin: 0;
            padding: 0 20px;
            text-align: center;
        }

        .btn-discord {
            display: inline-flex;
            align-items: center;
            gap: 14px;
            padding: 18px 40px;
            font-size: 22px;
            font-weight: bold;
            color: white;
            background-color: #5865F2;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            text-decoration: none;
            transition: background-color 0.3s ease, transform 0.2s ease, box-shadow 0.3s ease;
            box-shadow: 0 0 25px rgba(168, 85, 247, 0.6);
        }

        .btn-discord:hover {
            background-color: #4752C4;
            transform: scale(1.05);
            box-shadow: 0 0 35px rgba(168, 85, 247, 0.8);
        }

        /* SECCIÓN 2: Abajo (TikTok y Roblox) */
        .seccion-bottom {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            gap: 80px;
            padding-top: 60px;
            flex-wrap: wrap;
        }

        .perfil-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
            width: 250px;
        }

        /* Animación suave de flote */
        @keyframes flotar {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }

        /* Círculos contenedores */
        .avatar-container {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            overflow: hidden;
            animation: flotar 4s ease-in-out infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: transparent;
        }

        .container-tiktok { box-shadow: 0 0 25px rgba(168, 85, 247, 0.8); }
        .container-roblox { box-shadow: 0 0 25px rgba(255, 255, 255, 0.6); }

        /* LA SOLUCIÓN: Ajuste completo exacto para tus imágenes circulares */
        .img-tiktok, .img-roblox {
            width: 100%;
            height: 100%;
            object-fit: fill; /* Hace que tu imagen circular ocupe todo el espacio de forma perfecta */
        }

        /* Botón TikTok */
        .btn-tiktok {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 14px 28px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            background-color: #000000;
            border: none;
            border-radius: 8px;
            text-decoration: none;
            box-shadow: -3px -3px 0px #69c9d0, 3px 3px 0px #ee1d52;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .btn-tiktok:hover {
            transform: scale(1.05);
            box-shadow: -5px -5px 0px #69c9d0, 5px 5px 0px #ee1d52;
        }

        /* Botón Roblox */
        .btn-roblox {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 14px 28px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            background-color: #191b1d;
            border: 2px solid #ffffff;
            border-radius: 8px;
            text-decoration: none;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
            transition: transform 0.2s ease, background-color 0.2s ease;
        }

        .btn-roblox:hover {
            transform: scale(1.05);
            background-color: #ffffff;
            color: #000000;
        }

        .btn-tiktok i, .btn-roblox i { font-size: 20px; }
    </style>
</head>
<body>

    <div class="grid-bg"></div>

    <div class="wrapper">
        
        <div class="seccion-top">
            <h1 class="titulo-pixel">Zx_Ruru Comunity</h1>
            <a href="https://discord.gg/GzfUbcRrQM" target="_blank" class="btn-discord">
                <i class="fa-brands fa-discord"></i> Discord
            </a>
        </div>

        <div class="seccion-bottom">
            
            <div class="perfil-card">
                <div class="avatar-container container-tiktok">
                    <img src="https://raw.githubusercontent.com/rurumermar-ops/DiscordRuRu/main/Tiktok.png" alt="TikTok Zx_Deep" class="img-tiktok">
                </div>
                <a href="https://www.tiktok.com/@zx_deep" target="_blank" class="btn-tiktok">
                    <i class="fa-brands fa-tiktok"></i> TikTok
                </a>
            </div>

            <div class="perfil-card">
                <div class="avatar-container container-roblox">
                    <img src="https://raw.githubusercontent.com/rurumermar-ops/DiscordRuRu/main/Roblox.png" alt="Roblox Profile" class="img-roblox">
                </div>
                <a href="https://www.roblox.com/es/users/4049770594/profile" target="_blank" class="btn-roblox">
                    <i class="fa-solid fa-cube"></i> Roblox
                </a>
            </div>

        </div>

    </div>

</body>
</html>
