<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zx_Ruru Comunity</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

    <style>
        /* Centramos todo el contenido vertical y horizontalmente */
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column; /* Organiza el título arriba y el botón abajo */
            justify-content: center;
            align-items: center;
            background-color: #1a1b1f; /* Fondo oscuro */
            font-family: Arial, sans-serif;
            gap: 40px; /* Espacio entre el título y el botón */
        }

        /* Estilo del título Píxel Grande y Azul */
        .titulo-pixel {
            font-family: 'Press Start 2P', monospace; /* Aplica la fuente píxel */
            font-size: 36px; /* Tamaño grande */
            color: #00d2ff; /* Azul pixel brillante */
            text-align: center;
            text-transform: uppercase;
            text-shadow: 4px 4px 0px #005f73; /* Sombra estilo retro */
            margin: 0;
            padding: 0 20px;
        }

        /* Estilo del botón de Discord */
        .btn-discord {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 18px 36px;
            font-size: 20px;
            font-weight: bold;
            color: white;
            background-color: #5865F2; /* Azul Discord */
            border: none;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            transition: background-color 0.3s ease, transform 0.2s ease;
            box-shadow: 0 4px 20px rgba(88, 101, 242, 0.4);
        }

        /* Efecto al pasar el ratón */
        .btn-discord:hover {
            background-color: #4752C4;
            transform: scale(1.05);
        }

        .btn-discord i {
            font-size: 24px;
        }
    </style>
</head>
<body>

    <h1 class="titulo-pixel">Zx_Ruru Comunity</h1>

    <a href="https://discord.gg/GzfUbcRrQM" target="_blank" class="btn-discord">
        <i class="fa-brands fa-discord"></i> Discord
    </a>

</body>
</html>
