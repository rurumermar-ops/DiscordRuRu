<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Nueva Web</title>
    
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        h1, h2 {
            color: #2c3e50;
        }
        .contenedor {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 500px;
            margin: 20px;
        }
        
        /* --- ESTILOS PARA REDES Y ROBLOX --- */
        .seccion {
            background-color: #ecf0f1;
            margin: 20px 0;
            padding: 15px;
            border-radius: 8px;
        }
        .enlaces a {
            display: inline-block;
            margin: 5px 10px;
            text-decoration: none;
            color: #3498db;
            font-weight: bold;
            transition: 0.2s;
        }
        .enlaces a:hover {
            color: #2980b9;
            transform: scale(1.05);
        }
        /* ----------------------------------- */

        button {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            transition: 0.3s;
        }
        button:hover {
            background-color: #2980b9;
        }
    </style>
</head>
<body>

    <div class="contenedor">
        <h1>¡Bienvenido a mi Web!</h1>
        <p>Esta es la base para empezar a programar.</p>

        <div class="seccion">
            <h2>REDES</h2>
            <div class="enlaces">
                <a href="#">YouTube</a>
                <a href="#">Discord</a>
                <a href="#">TikTok</a>
                <a href="#">Instagram</a>
            </div>
        </div>

        <div class="seccion">
            <h2>ROBLOX</h2>
            <p>¡Pásate por mi perfil de Roblox y mis juegos favoritos!</p>
            <div class="enlaces">
                <a href="#">Mi Perfil de Roblox</a>
            </div>
        </div>

        <button id="miBoton">Haz clic aquí</button>
    </div>

    <script>
        document.getElementById('miBoton').addEventListener('click', function() {
            alert('¡El código funciona perfecto! Las redes y Roblox ya están integrados.');
        });
    </script>

</body>
</html>
