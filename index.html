<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" /><link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
<style>    /* Fondo infinito con scroll activo */    html, body {        margin: 0;        padding: 0;        min-height: 220vh;        background-color: #0a0110;        font-family: Arial, sans-serif;        color: white;        scroll-behavior: smooth;    }
    /* CAPA DEL FONDO: Fija mientras bajas */    .grid-bg {        position: fixed;        top: 0;        left: 0;        width: 100%;        height: 100%;        background-image:             linear-gradient(rgba(147, 51, 234, 0.25) 1px, transparent 1px),            linear-gradient(90deg, rgba(147, 51, 234, 0.25) 1px, transparent 1px);        background-size: 50px 50px;        background-position: center;        z-index: 1;    }
    /* Línea de escaneo láser */    .grid-bg::after {        content: "";        position: absolute;        top: 0;        left: 0;        width: 100%;        height: 100%;        background: linear-gradient(to bottom, transparent, rgba(168, 85, 247, 0.15), transparent);        animation: scanline 6s linear infinite;    }
    @keyframes scanline {        0% { transform: translateY(-100%); }        100% { transform: translateY(100%); }    }
    /* Contenedor principal */    .wrapper {        position: relative;        z-index: 2;        display: flex;        flex-direction: column;        align-items: center;        width: 100%;    }
    /* SECCIÓN 1: Arriba (Discord) */    .seccion-top {        height: 100vh;        display: flex;        flex-direction: column;        justify-content: center;        align-items: center;        gap: 45px;    }
    .titulo-pixel {        font-family: 'Press Start 2P', monospace;        font-size: 38px;        color: #ffffff;        text-transform: uppercase;        text-shadow: 5px 5px 0px #a855f7;        margin: 0;        padding: 0 20px;        text-align: center;    }
    .btn-discord {        display: inline-flex;        align-items: center;        gap: 14px;        padding: 18px 40px;        font-size: 22px;        font-weight: bold;        color: white;        background-color: #5865F2;        border: none;        border-radius: 10px;        cursor: pointer;        text-decoration: none;        transition: background-color 0.3s ease, transform 0.2s ease, box-shadow 0.3s ease;        box-shadow: 0 0 25px rgba(168, 85, 247, 0.6);    }
    .btn-discord:hover {        background-color: #4752C4;        transform: scale(1.05);        box-shadow: 0 0 35px rgba(168, 85, 247, 0.8);    }
    /* SECCIÓN 2: Abajo (Contiene la tabla horizontal y las redes) */    .seccion-bottom {        min-height: 120vh;        display: flex;        flex-direction: column;        align-items: center;        gap: 60px;        padding-top: 40px;        width: 100%;        max-width: 1000px;    }
    /* --- TABLA / LISTA HORIZONTAL ESCROLLEABLE --- */    .tabla-horizontal-container {        width: 90%;        background-color: rgba(25, 10, 40, 0.6);        border: 2px solid #a855f7;        border-radius: 12px;        padding: 20px;        box-shadow: 0 0 20px rgba(168, 85, 247, 0.3);        box-sizing: border-box;    }
    .tabla-horizontal {        display: flex;        gap: 20px;        overflow-x: auto;        padding-bottom: 15px;        scroll-behavior: smooth;    }
    .tabla-horizontal::-webkit-scrollbar {        height: 8px;    }    .tabla-horizontal::-webkit-scrollbar-track {        background: rgba(0, 0, 0, 0.3);        border-radius: 4px;    }    .tabla-horizontal::-webkit-scrollbar-thumb {        background: #a855f7;        border-radius: 4px;    }
    /* Estilo de cada Slot */    .slot-item {        flex: 0 0 200px;        background-color: #130321;        border: 1px solid rgba(255, 255, 255, 0.1);        border-radius: 8px;        padding: 15px;        display: flex;        flex-direction: column;        align-items: center;        justify-content: space-between;        min-height: 260px;        box-sizing: border-box;        gap: 10px;    }
    /* Texto dentro del slot */    .slot-title {        font-family: Arial, sans-serif;        font-size: 13px;        font-weight: bold;        color: #ffffff;        text-align: center;        margin: 0;        line-height: 1.3;    }
    /* Caja verde radioactiva por código CSS nativo */    .slot-icon-box {        font-size: 55px;        color: #22c55e;        filter: drop-shadow(0 0 12px rgba(34, 197, 94, 0.7));        margin: 10px 0;    }
    /* Botón verde BUY abajo */    .btn-buy {        width: 100%;        padding: 8px 0;        background-color: #22c55e;        color: white;        font-weight: bold;        text-transform: uppercase;        font-size: 14px;        border: none;        border-radius: 5px;        cursor: pointer;        transition: background-color 0.2s, transform 0.1s;        box-shadow: 0 0 10px rgba(34, 197, 94, 0.4);        text-align: center;        text-decoration: none;    }
    .btn-buy:hover {        background-color: #16a34a;        transform: scale(1.03);        box-shadow: 0 0 15px rgba(34, 197, 94, 0.6);    }
    /* --- CONTENEDOR DE REDES (TIKTOK Y ROBLOX) --- */    .redes-container {        display: flex;        justify-content: center;        align-items: flex-start;        gap: 80px;        flex-wrap: wrap;        width: 100%;    }
    .perfil-card {        display: flex;        flex-direction: column;        align-items: center;        gap: 25px;        width: 250px;    }
    @keyframes flotar {        0% { transform: translateY(0px); }        50% { transform: translateY(-15px); }        100% { transform: translateY(0px); }    }
    .avatar-container {        width: 140px;        height: 140px;        border-radius: 50%;        animation: flotar 4s ease-in-out infinite;        display: flex;        justify-content: center;        align-items: center;    }
    .container-tiktok {         background-color: #000000;        box-shadow: 0 0 25px rgba(168, 85, 247, 0.8);     }
    .container-roblox {         background-color: #191b1d;        box-shadow: 0 0 25px rgba(255, 255, 255, 0.6);     }
    .icon-floating {        font-size: 65px;        color: #ffffff;    }
    .icon-tiktok-glow {        text-shadow: -3px -3px 0px #69c9d0, 3px 3px 0px #ee1d52;    }
    .btn-tiktok {        display: inline-flex;        align-items: center;        gap: 10px;        padding: 14px 28px;        font-size: 18px;        font-weight: bold;        color: white;        background-color: #000000;        border: none;        border-radius: 8px;        text-decoration: none;        box-shadow: -3px -3px 0px #69c9d0, 3px 3px 0px #ee1d52;        transition: transform 0.2s ease, box-shadow 0.2s ease;    }
    .btn-tiktok:hover {        transform: scale(1.05);        box-shadow: -5px -5px 0px #69c9d0, 5px 5px 0px #ee1d52;    }
    .btn-roblox {        display: inline-flex;        align-items: center;        gap: 10px;        padding: 14px 28px;        font-size: 18px;        font-weight: bold;        color: white;        background-color: #191b1d;        border: 2px solid #ffffff;        border-radius: 8px;        text-decoration: none;        box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);        transition: transform 0.2s ease, background-color 0.2s ease;    }
    .btn-roblox:hover {        transform: scale(1.05);        background-color: #ffffff;        color: #000000;    }
    .btn-tiktok i, .btn-roblox i { font-size: 20px; }
    /* FLECHA MORADA FLOTANTE */    .scroll-arrow-container {        position: fixed;        right: 30px;        bottom: 50px;        z-index: 100;        opacity: 1;        transition: opacity 0.5s ease, transform 0.5s ease;        cursor: pointer;        display: flex;        flex-direction: column;        align-items: center;        gap: 5px;    }
    @keyframes flotarFlecha {        0% { transform: translateY(0px); }        50% { transform: translateY(15px); }        100% { transform: translateY(0px); }    }
    .scroll-arrow {        font-size: 40px;        color: #a855f7;        animation: flotarFlecha 2.5s ease-in-out infinite;        text-shadow: 0 0 15px rgba(168, 85, 247, 0.9);    }
    .scroll-text {        font-family: 'Press Start 2P', monospace;        font-size: 8px;        color: #a855f7;        text-transform: uppercase;        text-align: center;        text-shadow: 0 0 5px rgba(168, 85, 247, 0.5);    }
    .scroll-arrow-container.hidden {        opacity: 0;        transform: translateY(20px);        pointer-events: none;    }</style>
