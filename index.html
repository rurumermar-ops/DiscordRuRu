<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Sitio Web - GitHub Pages</title>
    <style>
        /* CSS Integrado */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .main-header {
            background-color: #1e1e1e;
            border-bottom: 1px solid #2d2d2d;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.3rem;
            font-weight: bold;
            color: #00adb5;
        }

        .main-content {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .card-container {
            max-width: 650px;
            width: 100%;
            background-color: #1e1e1e;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.6);
        }

        .welcome-section h1 {
            color: #00adb5;
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #aaaaaa;
            font-size: 1.05rem;
            margin-bottom: 25px;
        }

        /* ---- ESTILO DEL SLOT 1 ---- */
        .slot-container {
            background-color: #252525;
            border: 2px solid #00adb5;
            border-radius: 8px;
            margin: 25px 0;
            overflow: hidden;
        }

        .slot-header {
            background-color: #2d2d2d;
            padding: 10px 15px;
            border-bottom: 1px solid #3a3a3a;
            text-align: left;
        }

        .slot-header h2 {
            font-size: 1.1rem;
            color: #00adb5;
        }

        .image-wrapper {
            width: 100%;
            max-height: 400px;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #1a1a1a;
            overflow: hidden;
        }

        .responsive-img {
            width: 100%;
            height: auto;
            max-height: 400px;
            object-fit: contain;
            display: block;
        }

        .slot-footer {
            padding: 10px 15px;
            background-color: #2d2d2d;
            font-size: 0.9rem;
            color: #aaaaaa;
            border-top: 1px solid #3a3a3a;
            text-align: left;
        }

        .actions-section {
            margin-top: 25px;
            text-align: center;
        }

        .btn {
            display: inline-block;
            padding: 12px 24px;
            font-weight: bold;
            text-decoration: none;
            border-radius: 6px;
            background-color: #00adb5;
            color: #ffffff;
        }

        .main-footer {
            background-color: #1a1a1a;
            padding: 15px;
            text-align: center;
            font-size: 0.85rem;
            color: #666666;
            border-top: 1px solid #252525;
        }
    </style>
</head>
<body>

    <header class="main-header">
        <div class="nav-container">
            <span class="logo">MiProyecto</span>
        </div>
    </header>

    <main class="main-content">
        <div class="card-container">
            
            <section class="welcome-section">
                <h1>Mi Página Web</h1>
                <p class="subtitle">Desplegado en GitHub Pages</p>
            </section>

            <section class="slot-container">
                <div class="slot-header">
                    <h2>Slot 1: Imagen Vinculada</h2>
                </div>
                <div class="image-wrapper">
                    <img src="./Ketupat.jpg" alt="Imagen Ketupat" class="responsive-img">
                </div>
                <div class="slot-footer">
                    <p>Archivo: Ketupat.jpg</p>
                </div>
            </section>
            <section class="actions-section">
                <a href="https://github.com" class="btn" target="_blank">Ir a mi GitHub</a>
            </section>

        </div>
    </main>

    <footer class="main-footer">
        <p>&copy; 2026 Todos los derechos reservados.</p>
    </footer>

</body>
</html>
